# Compose de producción para la instancia EC2.
# Las imágenes se construyen en GitHub Actions y se publican en GHCR;
# la instancia solo hace `pull` (nunca compila -> sin riesgo de OOM).
#
# La DB es RDS (no corre como contenedor). El host y las credenciales se
# resuelven en runtime desde SSM Parameter Store (ver internal/config/secrets.go).
#
# Requiere un archivo .env en el mismo directorio (NO se commitea) con la
# config NO sensible: PORT, ENV=production, SECRETS_PROVIDER=ssm,
# SSM_PATH_PREFIX, AWS_REGION, JWT_EXPIRY_HOURS, API_BASE_URL, SMTP_HOST,
# SMTP_PORT, SMTP_FROM_EMAIL.
services:
  back:
    image: ghcr.io/nahuelmarianolosada/el-campeon-web-back:latest
    container_name: el_campeon_back
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - el_campeon_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  front:
    image: ghcr.io/nahuelmarianolosada/el-campeon-web-front:latest
    container_name: el_campeon_front
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - el_campeon_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  el_campeon_network:
    driver: bridge
